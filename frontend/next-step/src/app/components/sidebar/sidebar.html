<aside class="list-experiments" [class.collapsed]="isCollapsed">
    
    <div class="toggle-container">
        <button class="hamburger-btn" (click)="toggleSidebar()" [title]="isCollapsed ? 'Expandir' : 'Contraer'">
            {{ isCollapsed ? '☰' : '☰' }}
        </button>
    </div>

    <div class="sidebar-content">
        <h3 *ngIf="!isCollapsed"><strong>Historial</strong></h3>
        
        <div class="history-item active" [title]="isCollapsed ? 'Análisis #001 - Sensores' : ''">
            <span class="status-dot green"></span>
            <span *ngIf="!isCollapsed">Análisis #001 - Sensores</span>
        </div>

        <div class="history-item" [title]="isCollapsed ? 'Protocolo Destilación' : ''">
            <span class="status-dot gray"></span>
            <span *ngIf="!isCollapsed">Protocolo Destilación</span>
        </div>
    </div>
</aside>
